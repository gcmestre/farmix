{% extends "base.html" %}
{% load i18n core_tags %}

{% block title %}{% trans "Clients" %} - Farmix{% endblock %}

{% block content %}
<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6">
    <div class="mb-4 sm:mb-0">
        <h1 class="text-2xl font-bold text-gray-900">{% trans "Clients" %}</h1>
    </div>
    <div class="flex flex-wrap gap-2">
        {% if user|can_manage:"orders" %}
        <a href="{% url 'orders:client_create' %}" class="inline-flex items-center text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5">
            <svg class="w-3.5 h-3.5 me-2" fill="none" viewBox="0 0 18 18">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 1v16M1 9h16"/>
            </svg>
            {% trans "New Client" %}
        </a>
        {% endif %}
    </div>
</div>

<form method="get" class="max-w-md mb-4">
    <div class="relative">
        <div class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none">
            <svg class="w-4 h-4 text-gray-500" fill="none" viewBox="0 0 20 20"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"/></svg>
        </div>
        <input type="text" name="q"
               hx-get="{% url 'orders:client_list' %}" hx-target="#client-table" hx-trigger="keyup changed delay:300ms"
               class="block w-full p-2.5 ps-10 text-sm text-gray-900 border border-gray-300 rounded-lg bg-gray-50 focus:ring-blue-500 focus:border-blue-500" placeholder="{% trans 'Search clients...' %}">
    </div>
</form>

<div id="client-table">{% include "orders/partials/_client_table.html" %}</div>
{% endblock %}
