{% extends "base.html" %}
{% load i18n %}

{% block title %}{{ title }} - Farmix{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">{{ title }}</h1>
</div>
<div class="max-w-2xl">
    <div class="p-6 bg-white border border-gray-200 rounded-lg shadow">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            {% include "components/_form_field.html" %}
            {% endfor %}
            <div class="flex gap-3 pt-4">
                <button type="submit" class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5">
                    {% trans "Save" %}
                </button>
                <a href="{% url 'orders:complaint_list' %}" class="py-2.5 px-5 text-sm font-medium text-gray-900 bg-white rounded-lg border border-gray-200 hover:bg-gray-100 hover:text-blue-700 focus:z-10 focus:ring-4 focus:ring-gray-100">
                    {% trans "Cancel" %}
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
