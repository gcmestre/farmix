{% load i18n widget_tweaks %}

<form method="post" action="{% url 'orders:order_item_add' order.pk %}"
      hx-post="{% url 'orders:order_item_add' order.pk %}" hx-target="#order-items" hx-swap="innerHTML"
      class="px-6 py-4 bg-gray-50 border-b border-gray-200">
    {% csrf_token %}
    <div class="grid grid-cols-4 gap-3">
        {% for field in form %}
        <div>
            <label class="block mb-1 text-xs font-medium text-gray-900">{{ field.label }}</label>
            {% render_field field class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5" %}
        </div>
        {% endfor %}
    </div>
    <div class="mt-3 flex gap-2">
        <button type="submit" class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-3 py-1.5">{% trans "Add" %}</button>
        <button type="button" onclick="this.closest('form').remove()" class="py-1.5 px-3 text-sm font-medium text-gray-900 bg-white rounded-lg border border-gray-200 hover:bg-gray-100 hover:text-blue-700 focus:z-10 focus:ring-4 focus:ring-gray-100">{% trans "Cancel" %}</button>
    </div>
</form>
