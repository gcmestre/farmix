{% comment %}
Usage: {% include "components/_table.html" with table_id="my-table" %}
{% endcomment %}
<div class="relative overflow-x-auto shadow-md sm:rounded-lg">
    <table class="w-full text-sm text-left text-gray-500" {% if table_id %}id="{{ table_id }}"{% endif %}>
        <thead class="text-xs text-gray-700 uppercase bg-gray-50">
            {{ table_head }}
        </thead>
        <tbody>
            {{ table_body }}
        </tbody>
    </table>
</div>
