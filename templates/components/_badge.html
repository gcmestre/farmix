{% comment %}
Usage: {% include "components/_badge.html" with label="Active" color="green" %}
Colors: green, red, yellow, blue, gray, indigo, purple
{% endcomment %}
<span class="text-xs font-medium me-2 px-2.5 py-0.5 rounded-full
    {% if color == 'green' %}bg-green-100 text-green-800
    {% elif color == 'red' %}bg-red-100 text-red-800
    {% elif color == 'yellow' %}bg-yellow-100 text-yellow-800
    {% elif color == 'blue' %}bg-blue-100 text-blue-800
    {% elif color == 'indigo' %}bg-indigo-100 text-indigo-800
    {% elif color == 'purple' %}bg-purple-100 text-purple-800
    {% else %}bg-gray-100 text-gray-800{% endif %}">{{ label }}</span>
