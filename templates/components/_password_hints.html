{% if help_text %}
<div class="mt-2 p-3 bg-gray-50 border border-gray-200 rounded-lg">
    <div class="password-hints text-xs text-gray-500 space-y-1.5
                [&_ul]:space-y-1.5 [&_ul]:list-none [&_ul]:m-0 [&_ul]:p-0
                [&_li]:flex [&_li]:items-start [&_li]:gap-1.5
                [&_li::before]:content-['•'] [&_li::before]:text-gray-400 [&_li::before]:font-bold [&_li::before]:leading-4">
        {{ help_text|safe }}
    </div>
</div>
{% endif %}
