{% comment %}
Usage: {% include "components/_modal.html" with modal_id="my-modal" modal_title="Title" %}
Trigger: <button data-modal-target="my-modal" data-modal-toggle="my-modal">Open</button>
{% endcomment %}
<div id="{{ modal_id }}" tabindex="-1" aria-hidden="true"
     class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full">
    <div class="relative p-4 w-full max-w-2xl max-h-full">
        <div class="relative bg-white rounded-lg shadow">
            <div class="flex items-center justify-between p-4 md:p-5 border-b rounded-t">
                {% if modal_title %}
                <h3 class="text-xl font-semibold text-gray-900">{{ modal_title }}</h3>
                {% endif %}
                <button type="button" class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center" data-modal-hide="{{ modal_id }}">
                    {% load i18n %}<span class="sr-only">{% trans "Close" %}</span>
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 14 14"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/></svg>
                </button>
            </div>
            <div class="p-4 md:p-5" id="{{ modal_id }}-content">
                {{ modal_body }}
            </div>
            <div class="flex items-center p-4 md:p-5 border-t border-gray-200 rounded-b">
                <button data-modal-hide="{{ modal_id }}" type="button"
                        class="py-2.5 px-5 text-sm font-medium text-gray-900 bg-white rounded-lg border border-gray-200 hover:bg-gray-100 hover:text-blue-700 focus:z-10 focus:ring-4 focus:ring-gray-100">
                    {% trans "Close" %}
                </button>
            </div>
        </div>
    </div>
</div>
