{% load i18n %}
<ul class="divide-y divide-gray-200">
    {% for step in steps %}
    <li class="py-3">
        <div class="flex items-center gap-3">
            <span class="h-6 w-6 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center text-xs font-bold">{{ step.step_number }}</span>
            <div>
                <p class="text-sm font-medium text-gray-900">{{ step.title }}</p>
                {% if step.description %}<p class="text-xs text-gray-500">{{ step.description|truncatewords:20 }}</p>{% endif %}
            </div>
        </div>
    </li>
    {% empty %}
    <li class="py-4 text-center text-sm text-gray-500">{% trans "No steps defined." %}</li>
    {% endfor %}
</ul>
