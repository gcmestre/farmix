{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Password Changed" %} - Farmix{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">{% trans "Password Changed" %}</h1>
</div>
<div class="max-w-2xl">
    <div class="p-6 bg-white border border-gray-200 rounded-lg shadow">
        <div class="p-4 text-sm text-green-800 rounded-lg bg-green-50" role="alert">
            {% trans "Your password has been changed successfully." %}
        </div>
        <div class="pt-4">
            <a href="{% url 'core:dashboard' %}" class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5">
                {% trans "Back to Dashboard" %}
            </a>
        </div>
    </div>
</div>
{% endblock %}
